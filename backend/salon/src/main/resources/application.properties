# Configuracoes de conexao com o MySQL (Ajuste a senha de acordo com a sua maquina)
spring.datasource.url=jdbc:mysql://localhost:3306/salao_leila?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# A configuração responsavel por criar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Opcional: Mostra o SQL no console para facilitar a depuracao
spring.jpa.show-sql=true